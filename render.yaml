services:
  - type: web
    name: dtdc-crm
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dtdc-crm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PIN
        sync: false

databases:
  - name: dtdc-crm-db
    databaseName: dtdc_crm_dev
    user: dtdc_user
