<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTDC CRM | Enterprise</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card-blur {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
        }

        .dtdc-blue {
            color: #003366;
        }

        .dtdc-red {
            color: #e31e24;
        }

        .bg-dtdc-blue {
            background-color: #003366;
        }

        .bg-dtdc-red {
            background-color: #e31e24;
        }
    </style>
</head>

<body class="bg-gray-50 text-slate-900 min-h-screen pb-28">

    <!-- Top Branding -->
    <header class="p-6 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-dtdc-red rounded-lg flex items-center justify-center text-white font-bold italic">D
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">DTDC <span class="text-dtdc-blue">CRM</span>
            </h1>
        </div>
        <div class="w-10 h-10 bg-white rounded-full shadow-sm border border-gray-100 flex items-center justify-center">
            <i data-lucide="user" class="w-5 h-5 text-slate-500"></i>
        </div>
    </header>

    <main class="px-4 md:px-8 max-w-7xl mx-auto pb-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 glass-nav h-20 px-6 sm:px-10 flex items-center justify-between z-50">
        <a href="/" class="flex flex-col items-center gap-1 group">
            <div class="p-2 rounded-xl group-hover:bg-blue-50 transition-colors">
                <i data-lucide="layout-dashboard" class="w-6 h-6 text-slate-500 group-hover:text-dtdc-blue"></i>
            </div>
            <span class="text-[10px] font-medium text-slate-500 group-hover:text-dtdc-blue">Home</span>
        </a>
        <a href="/shipments" class="flex flex-col items-center gap-1 group">
            <div class="p-2 rounded-xl group-hover:bg-blue-50 transition-colors">
                <i data-lucide="package" class="w-6 h-6 text-slate-500 group-hover:text-dtdc-blue"></i>
            </div>
            <span class="text-[10px] font-medium text-slate-500 group-hover:text-dtdc-blue">Tracking</span>
        </a>
        <a href="/add" class="relative -top-6">
            <div
                class="w-14 h-14 bg-dtdc-red shadow-lg shadow-red-200 rounded-full flex items-center justify-center text-white ring-4 ring-white">
                <i data-lucide="plus" class="w-8 h-8"></i>
            </div>
        </a>
        <a href="/customers" class="flex flex-col items-center gap-1 group">
            <div class="p-2 rounded-xl group-hover:bg-blue-50 transition-colors">
                <i data-lucide="users" class="w-6 h-6 text-slate-500 group-hover:text-dtdc-blue"></i>
            </div>
            <span class="text-[10px] font-medium text-slate-500 group-hover:text-dtdc-blue">Clients</span>
        </a>
        <a href="/insights" class="flex flex-col items-center gap-1 group">
            <div class="p-2 rounded-xl group-hover:bg-blue-50 transition-colors">
                <i data-lucide="bar-chart-3" class="w-6 h-6 text-slate-500 group-hover:text-dtdc-blue"></i>
            </div>
            <span class="text-[10px] font-medium text-slate-500 group-hover:text-dtdc-blue">Growth</span>
        </a>
    </nav>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
