<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authorize | DTDC CRM</title>
    <!-- Elegant Font Weights -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Highly premium deep blue background with a very subtle elegant glow */
        .bg-premium {
            background-color: #021f3d;
            background-image: radial-gradient(circle at 50% 15%, rgba(227, 30, 36, 0.1) 0%, transparent 60%);
        }

        /* Sleek, frosted glass card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease;
        }

        /* Sophisticated PIN input styling */
        .pin-input {
            letter-spacing: 0.5em;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
        }

        .pin-input::-moz-placeholder {
            letter-spacing: 0.5em;
            opacity: 0.3;
        }

        .pin-input::placeholder {
            letter-spacing: 0.5em;
            opacity: 0.3;
        }

        /* Elegant smooth appearing animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="bg-premium flex items-center justify-center p-6 text-white pt-5 pb-20">

    <div class="w-full max-w-[340px] mt-[-8vh] animate-fade-up">
        <!-- Refined Branding -->
        <div class="text-center mb-10 flex flex-col items-center">
            <div
                class="w-16 h-16 bg-gradient-to-br from-white to-slate-200 rounded-2xl flex items-center justify-center mb-6 shadow-2xl shadow-blue-900/50 border border-white/10 relative">
                <!-- Inner glow effect -->
                <div class="absolute inset-0 rounded-2xl ring-1 ring-inset ring-black/5 pointer-events-none"></div>
                <div
                    class="w-10 h-10 bg-gradient-to-br from-[#e31e24] to-[#cc1920] rounded-[10px] flex items-center justify-center text-white font-black italic text-xl shadow-inner border border-red-500/20">
                    D
                </div>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white/95">DTDC <span
                    class="text-white/40 font-light">CRM</span></h1>
            <p class="text-blue-200/50 mt-2 font-medium text-[11px] tracking-[0.2em] uppercase">Enterprise Access</p>
        </div>

        <form method="post" class="glass-card p-7 sm:p-8 rounded-[32px] relative overflow-hidden group">
            <!-- Subtle decorative flare -->
            <div
                class="absolute -top-10 -right-10 w-32 h-32 bg-white/5 rounded-full blur-3xl pointer-events-none opacity-50 group-hover:opacity-100 transition-opacity duration-700">
            </div>

            <div class="mb-8 relative z-10">
                <label id="pin-label"
                    class="block text-[10px] font-bold text-white/40 uppercase tracking-[0.2em] mb-4 text-center">
                    Security PIN
                </label>
                <!-- Sleek PIN Input -->
                <input type="password" name="pin" maxlength="4" autofocus placeholder="••••"
                    class="w-full bg-black/20 border border-white/10 rounded-2xl py-4 text-center text-3xl font-medium pin-input focus:bg-black/30 focus:border-white/30 focus:ring-[3px] focus:ring-white/10 outline-none transition-all text-white shadow-inner"
                    required aria-labelledby="pin-label" autocomplete="off" />
            </div>

            <!-- Elegant Login Button -->
            <button type="submit"
                class="w-full bg-white/10 hover:bg-white/15 text-white/90 py-4 rounded-2xl font-bold text-sm transition-all shadow-sm border border-white/10 active:scale-[0.98] flex items-center justify-center gap-2.5 relative z-10 backdrop-blur-md">
                <span class="tracking-wide">Authorize</span>
                <i data-lucide="arrow-right"
                    class="w-4 h-4 text-white/50 group-hover:text-white/90 group-hover:translate-x-1 transition-all"></i>
            </button>
        </form>

        <div class="text-center mt-10 flex items-center justify-center gap-1.5 opacity-40">
            <i data-lucide="lock" class="w-3.5 h-3.5 text-white/70"></i>
            <p class="text-[9px] uppercase tracking-[0.2em] font-semibold text-white">End-to-End Encrypted</p>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
