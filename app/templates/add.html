{% extends "base.html" %}

{% block content %}

<div class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-2">
    <div>
        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">New Booking</h2>
        <p class="text-sm font-medium text-slate-500 mt-0.5">Enter shipment details</p>
    </div>
</div>

<div class="card-blur p-6 sm:p-8 rounded-[32px] max-w-xl mx-auto shadow-sm relative overflow-hidden">

    <form id="bookingForm"
        method="post"
        action="/add"
        target="_blank"
        class="space-y-5"
        onsubmit="handleFormSubmit()">

        <!-- PHONE -->
        <div>
            <label class="text-xs font-bold text-slate-600 uppercase">Customer Mobile</label>

            <div class="relative mt-1">
                <input type="tel"
                    name="phone"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    placeholder="9876543210"
                    class="w-full border rounded-xl py-3 px-10 font-semibold"
                    required>

                <i data-lucide="phone"
                    class="absolute left-3 top-[14px] w-5 h-5 text-slate-400"></i>
            </div>
        </div>


        <!-- TRACKING + SCAN -->
        <div>
            <label class="text-xs font-bold text-slate-600 uppercase">
                Tracking ID (AWB)
            </label>

            <div class="flex gap-2 mt-1">

                <div class="relative flex-1">
                    <input id="trackingInput"
                        name="tracking_id"
                        type="text"
                        placeholder="D12345678"
                        class="w-full border rounded-xl py-3 px-10 font-bold uppercase"
                        required>

                    <i data-lucide="hash"
                        class="absolute left-3 top-[14px] w-5 h-5 text-slate-400"></i>
                </div>

                <button type="button"
                    onclick="startScanner()"
                    class="px-4 bg-black text-white rounded-xl flex items-center gap-2">
                    <i data-lucide="scan-line" class="w-4 h-4"></i>
                    Scan
                </button>

            </div>
        </div>


        <!-- DESTINATION -->
        <div>
            <label class="text-xs font-bold text-slate-600 uppercase">Destination</label>

            <div class="relative mt-1">
                <input type="text"
                    name="destination_city"
                    placeholder="City Name"
                    class="w-full border rounded-xl py-3 px-10 font-semibold"
                    required>

                <i data-lucide="map-pin"
                    class="absolute left-3 top-[14px] w-4 h-4 text-slate-400"></i>
            </div>
        </div>


        <!-- RATE -->
        <div>
            <label class="text-xs font-bold text-slate-600 uppercase">Charges (₹)</label>

            <div class="relative mt-1">
                <input type="number"
                    name="rate"
                    class="w-full border rounded-xl py-3 px-10 font-bold"
                    required>

                <i data-lucide="indian-rupee"
                    class="absolute left-3 top-[14px] w-4 h-4 text-slate-400"></i>
            </div>
        </div>


        <!-- SUBMIT -->
        <button id="submitBtn"
            class="w-full bg-red-600 text-white py-4 rounded-xl font-bold mt-4">
            <span>Create Booking</span>
        </button>

    </form>
</div>



<!-- SCANNER MODAL -->
<div id="scannerModal"
    style="display:none"
    class="fixed inset-0 bg-black/70 items-center justify-center z-50">

    <div class="bg-white rounded-2xl p-4 w-[95%] max-w-md">

        <div class="flex justify-between mb-3">
            <h3 class="font-bold">Scan Barcode</h3>
            <button onclick="stopScanner()">✕</button>
        </div>

        <div id="reader"></div>

        <p class="text-xs text-center mt-2 text-slate-500">
            Point camera at AWB barcode
        </p>
    </div>
</div>



<script>

/* ================= FORM EFFECT ================= */

function handleFormSubmit() {
    const btn = document.getElementById('submitBtn');
    btn.innerText = "Routing...";

    setTimeout(() => {
        document.getElementById('bookingForm').reset();
        btn.innerText = "Create Booking";
    }, 2000);
}


/* ================= BARCODE SCANNER ================= */

let scanner = null;

function startScanner() {

    const modal = document.getElementById("scannerModal");
    modal.style.display = "flex";

    scanner = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
        .then(devices => {

            if (!devices.length) {
                alert("Camera not found");
                return;
            }

            scanner.start(
                devices[0].id,
                { fps: 10, qrbox: 250 },
                (decodedText) => {

                    document.getElementById("trackingInput").value = decodedText;
                    stopScanner();
                }
            );
        })
        .catch(err => {
            console.error(err);
            alert("Camera permission required");
        });
}

function stopScanner() {

    const modal = document.getElementById("scannerModal");

    if (scanner) {
        scanner.stop()
            .then(() => scanner.clear())
            .catch(() => {});
    }

    modal.style.display = "none";
}

</script>

{% endblock %}
