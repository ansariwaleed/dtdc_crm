{% extends "base.html" %}

{% block content %}
<div class="mb-8">
    <h2 class="text-2xl font-bold text-slate-800">New Booking</h2>
    <p class="text-sm text-slate-500">Add a shipment to the system</p>
</div>

<div class="card-blur p-6 sm:p-8 rounded-[32px] border border-white shadow-sm max-w-2xl mx-auto">
    <form id="bookingForm" method="post" action="/add" class="space-y-5" target="_blank" onsubmit="handleFormSubmit()">

        <div class="space-y-1.5">
            <label class="text-xs font-semibold text-slate-600 px-1">Customer Mobile Required</label>
            <div class="relative">
                <input type="tel" name="phone" placeholder="9876543210" pattern="[0-9]{10}" maxlength="10"
                    class="w-full bg-slate-50/50 border border-slate-200/80 rounded-2xl py-3.5 px-12 focus:border-dtdc-blue focus:ring-4 focus:ring-blue-100/50 focus:bg-white active:ring-4 active:ring-blue-50 outline-none transition-all shadow-sm text-slate-800 font-medium"
                    required>
                <i data-lucide="phone" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
            </div>
            <p class="text-[10px] text-slate-400 px-1">10-digit mobile number</p>
        </div>

        <div class="space-y-1.5">
            <label class="text-xs font-semibold text-slate-600 px-1">Tracking ID (AWB)</label>
            <div class="relative">
                <input type="text" name="tracking_id" placeholder="e.g. D12345678"
                    class="w-full bg-slate-50/50 border border-slate-200/80 rounded-2xl py-3.5 px-12 focus:border-dtdc-blue focus:ring-4 focus:ring-blue-100/50 focus:bg-white active:ring-4 active:ring-blue-50 outline-none transition-all shadow-sm uppercase font-semibold text-slate-800"
                    required>
                <i data-lucide="hash" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-600 px-1">Destination City</label>
                <div class="relative">
                    <input type="text" name="destination_city" placeholder="City Name"
                        class="w-full bg-slate-50/50 border border-slate-200/80 rounded-2xl py-3.5 px-12 focus:border-dtdc-blue focus:ring-4 focus:ring-blue-100/50 focus:bg-white active:ring-4 active:ring-blue-50 outline-none transition-all shadow-sm uppercase font-medium text-slate-800"
                        required>
                    <i data-lucide="map-pin" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-slate-600 px-1">Service Charges (₹)</label>
                <div class="relative">
                    <input type="number" step="0.01" name="rate" placeholder="0.00"
                        class="w-full bg-slate-50/50 border border-slate-200/80 rounded-2xl py-3.5 px-12 focus:border-dtdc-blue focus:ring-4 focus:ring-blue-100/50 focus:bg-white active:ring-4 active:ring-blue-50 outline-none transition-all shadow-sm font-bold text-slate-800"
                        required>
                    <i data-lucide="indian-rupee" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                </div>
            </div>
        </div>

        <div class="pt-6 border-t border-slate-100 mt-2">
            <button type="submit" id="submitBtn"
                class="w-full bg-dtdc-red text-white py-4 px-6 rounded-2xl font-bold shadow-lg shadow-red-200 hover:shadow-red-300 hover:bg-[#ff2c33] transition-all flex items-center justify-center gap-3 active:scale-95 group">
                <span class="tracking-wide">Create Booking & Notify</span>
                <i data-lucide="send" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>

    </form>
</div>

<script>
    function handleFormSubmit() {
        const btn = document.getElementById('submitBtn');
        const span = btn.querySelector('span');

        // Visual feedback
        span.innerText = 'GENERATING WHATSAPP LINK...';
        btn.classList.replace('bg-dtdc-red', 'bg-green-600');

        // Reset form after a delay (since it opened it in a new tab)
        setTimeout(() => {
            document.getElementById('bookingForm').reset();
            span.innerText = 'BOOK & SEND WHATSAPP';
            btn.classList.replace('bg-green-600', 'bg-dtdc-red');
        }, 1500);
    }
</script>

{% endblock %}
