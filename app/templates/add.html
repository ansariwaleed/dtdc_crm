{% extends "base.html" %}

{% block content %}
<div class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-2">
    <div>
        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">New Booking</h2>
        <p class="text-sm font-medium text-slate-500 mt-0.5">Enter shipment details</p>
    </div>
</div>

<div class="card-blur p-6 sm:p-8 rounded-[32px] max-w-xl mx-auto shadow-sm relative overflow-hidden">
    <!-- Decorative subtle background element -->
    <div
        class="absolute -right-20 -top-20 w-40 h-40 bg-gradient-to-br from-red-50 to-transparent rounded-full blur-3xl pointer-events-none opacity-60">
    </div>

    <form id="bookingForm" method="post" action="/add" class="space-y-5 relative z-10" target="_blank"
        onsubmit="handleFormSubmit()">

        <!-- Phone Input -->
        <div class="space-y-1.5">
            <label class="flex items-center justify-between px-1">
                <span class="text-xs font-bold text-slate-600 uppercase tracking-widest">Customer Mobile</span>
                <span class="text-[10px] font-semibold text-slate-400">Required</span>
            </label>
            <div class="relative group">
                <input type="tel" name="phone" placeholder="9876543210" pattern="[0-9]{10}" maxlength="10"
                    class="w-full bg-slate-50/80 border border-slate-200/60 rounded-xl py-3.5 px-12 text-base font-semibold tracking-wide focus:border-dtdc-blue focus:ring-[3px] focus:ring-blue-100/50 focus:bg-white transition-all text-slate-800 placeholder:text-slate-300 placeholder:font-medium placeholder:tracking-normal outline-none shadow-sm"
                    required>
                <i data-lucide="phone"
                    class="absolute left-4 top-[15px] w-5 h-5 text-slate-400 group-focus-within:text-dtdc-blue transition-colors"></i>
            </div>
        </div>

        <!-- Tracking ID -->
        <div class="space-y-1.5">
            <label class="block text-xs font-bold text-slate-600 px-1 uppercase tracking-widest">Tracking ID
                (AWB)</label>
            <div class="relative group">
                <input type="text" name="tracking_id" placeholder="e.g. D12345678"
                    class="w-full bg-slate-50/80 border border-slate-200/60 rounded-xl py-3.5 px-12 text-base font-bold uppercase focus:border-dtdc-blue focus:ring-[3px] focus:ring-blue-100/50 focus:bg-white transition-all text-slate-800 placeholder:text-slate-300 placeholder:font-medium placeholder:normal-case outline-none shadow-sm"
                    required>
                <i data-lucide="hash"
                    class="absolute left-4 top-[15px] w-5 h-5 text-slate-400 group-focus-within:text-dtdc-blue transition-colors"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 pt-2">
            <!-- Destination -->
            <div class="space-y-1.5">
                <label class="block text-xs font-bold text-slate-600 px-1 uppercase tracking-widest">Destination</label>
                <div class="relative group">
                    <input type="text" name="destination_city" placeholder="City Name"
                        class="w-full bg-slate-50/80 border border-slate-200/60 rounded-xl py-3.5 px-11 text-sm font-semibold capitalize focus:border-dtdc-blue focus:ring-[3px] focus:ring-blue-100/50 focus:bg-white transition-all text-slate-800 placeholder:text-slate-300 placeholder:font-medium outline-none shadow-sm"
                        required>
                    <i data-lucide="map-pin"
                        class="absolute left-3.5 top-[15px] w-4 h-4 text-slate-400 group-focus-within:text-dtdc-blue transition-colors"></i>
                </div>
            </div>

            <!-- Rate -->
            <div class="space-y-1.5">
                <label class="block text-xs font-bold text-slate-600 px-1 uppercase tracking-widest">Charges (₹)</label>
                <div class="relative group">
                    <input type="number" step="1" name="rate" placeholder="0"
                        class="w-full bg-slate-50/80 border border-slate-200/60 rounded-xl py-3.5 pl-11 pr-4 text-base font-bold focus:border-dtdc-blue focus:ring-[3px] focus:ring-blue-100/50 focus:bg-white transition-all text-slate-800 placeholder:text-slate-300 outline-none shadow-sm"
                        required>
                    <i data-lucide="indian-rupee"
                        class="absolute left-3.5 top-[15px] w-4 h-4 text-slate-400 group-focus-within:text-dtdc-blue transition-colors"></i>
                </div>
            </div>
        </div>

        <!-- Refined Premium Action Button -->
        <div class="pt-6 mt-4">
            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-dtdc-red to-[#d01820] text-white py-4 px-6 rounded-xl font-bold text-sm shadow-[0_8px_20px_-4px_rgba(227,30,36,0.3)] hover:shadow-[0_12px_25px_-6px_rgba(227,30,36,0.4)] hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-3 group border border-red-500/20">
                <span class="tracking-wide">Create Booking</span>
                <i data-lucide="send" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
            </button>
            <div class="flex items-center justify-center gap-1.5 mt-4 opacity-60">
                <i data-lucide="info" class="w-3 h-3 text-slate-500"></i>
                <p class="text-[11px] font-medium text-slate-500">Opens WhatsApp automatically</p>
            </div>
        </div>

    </form>
</div>

<script>
    function handleFormSubmit() {
        const btn = document.getElementById('submitBtn');
        const span = btn.querySelector('span');
        const icon = btn.querySelector('i');

        // Visual feedback - elegant state change
        span.innerText = 'Routing...';
        icon.setAttribute('data-lucide', 'check');
        lucide.createIcons();
        btn.classList.replace('from-dtdc-red', 'from-emerald-600');
        btn.classList.replace('to-[#d01820]', 'to-emerald-500');
        btn.classList.replace('shadow-[0_8px_20px_-4px_rgba(227,30,36,0.3)]', 'shadow-[0_8px_20px_-4px_rgba(16,185,129,0.3)]');
        btn.classList.replace('border-red-500/20', 'border-emerald-500/20');

        // Reset form gracefully
        setTimeout(() => {
            document.getElementById('bookingForm').reset();
            span.innerText = 'Create Booking';
            icon.setAttribute('data-lucide', 'send');
            lucide.createIcons();
            btn.classList.replace('from-emerald-600', 'from-dtdc-red');
            btn.classList.replace('to-emerald-500', 'to-[#d01820]');
            btn.classList.replace('shadow-[0_8px_20px_-4px_rgba(16,185,129,0.3)]', 'shadow-[0_8px_20px_-4px_rgba(227,30,36,0.3)]');
            btn.classList.replace('border-emerald-500/20', 'border-red-500/20');

            document.querySelector('input[name="phone"]').focus();
        }, 2000);
    }
</script>

{% endblock %}
